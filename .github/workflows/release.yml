name: release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

# Required so tauri-action can create releases and upload artifacts.
permissions:
    contents: write

jobs:
    # Open a draft release first so every matrix job uploads to the same place.
    create-release:
        runs-on: ubuntu-latest
        outputs:
            release_id: ${{ steps.create.outputs.result }}
            version: ${{ steps.version.outputs.version }}
            tag: ${{ steps.version.outputs.tag }}
        steps:
            - uses: actions/checkout@v4

            - name: Resolve release tag
              id: version
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  # On a tag push GITHUB_REF looks like `refs/tags/v1.2.3`; on a
                  # manual `workflow_dispatch` it points at the branch ref, so we
                  # fall back to `v<package.json version>`. createRelease will
                  # create the tag on the default branch if it does not exist.
                  if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
                      TAG="${GITHUB_REF#refs/tags/}"
                  else
                      TAG="v${VERSION}"
                  fi
                  echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
                  echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

            - name: Create draft release
              id: create
              uses: actions/github-script@v7
              env:
                  RELEASE_TAG: ${{ steps.version.outputs.tag }}
                  RELEASE_VERSION: ${{ steps.version.outputs.version }}
              with:
                  script: |
                      const { data } = await github.rest.repos.createRelease({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          tag_name: process.env.RELEASE_TAG,
                          name: `Kode v${process.env.RELEASE_VERSION}`,
                          body: "See assets below to install Kode.",
                          draft: true,
                          prerelease: false
                      });
                      return data.id;
                  result-encoding: string

    build-tauri:
        needs: create-release
        strategy:
            fail-fast: false
            matrix:
                include:
                    # Universal macOS binary: built on the Apple Silicon runner
                    # and cross-compiled to x86_64 in the same job, so a single
                    # DMG works on both architectures. Tauri's updater publishes
                    # the universal artifact under both `darwin-aarch64` and
                    # `darwin-x86_64` entries in latest.json automatically.
                    - platform: macos-14
                      args: "--target universal-apple-darwin"
                      rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
                    - platform: windows-latest
                      args: ""
                      rust-targets: ""

        runs-on: ${{ matrix.platform }}
        # Fail fast if a runner pool ever stops accepting jobs again instead of
        # blocking the release indefinitely.
        timeout-minutes: 60

        steps:
            - uses: actions/checkout@v4

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.rust-targets }}

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Cache cargo
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: ./src-tauri -> target

            - name: Install frontend deps
              run: bun install

            - name: Build and publish
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  # Updater signing (required so latest.json contains valid signatures).
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
                  # ----------------------------------------------------------------
                  # macOS code signing + notarization. Leave commented out until you
                  # have an Apple Developer Program membership and have added every
                  # secret below. Passing them as empty strings (which happens when
                  # the secret doesn't exist) makes tauri-bundler try to codesign
                  # with an empty identity and fail with `security: SecKeychainItem
                  # Import` errors. So either uncomment the whole block once every
                  # secret is set, or leave it all commented.
                  # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
                  # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
                  # APPLE_ID: ${{ secrets.APPLE_ID }}
                  # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
                  # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
              with:
                  releaseId: ${{ needs.create-release.outputs.release_id }}
                  args: ${{ matrix.args }}

    publish-release:
        needs: [create-release, build-tauri]
        runs-on: ubuntu-latest
        steps:
            - name: Publish release
              uses: actions/github-script@v7
              env:
                  RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
              with:
                  script: |
                      await github.rest.repos.updateRelease({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          release_id: process.env.RELEASE_ID,
                          draft: false,
                          prerelease: false,
                          make_latest: "true"
                      });
