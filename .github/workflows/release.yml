name: release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

# Required so tauri-action can create releases and upload artifacts.
permissions:
    contents: write

jobs:
    # Open a draft release first so every matrix job uploads to the same place.
    create-release:
        runs-on: ubuntu-latest
        outputs:
            release_id: ${{ steps.create.outputs.result }}
            version: ${{ steps.version.outputs.version }}
        steps:
            - uses: actions/checkout@v4

            - name: Read app version
              id: version
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"

            - name: Create draft release
              id: create
              uses: actions/github-script@v7
              with:
                  script: |
                      const { data } = await github.rest.repos.createRelease({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          tag_name: context.ref.replace("refs/tags/", ""),
                          name: `Kode v${{ steps.version.outputs.version }}`,
                          body: "See assets below to install Kode.",
                          draft: true,
                          prerelease: false
                      });
                      return data.id;
                  result-encoding: string

    build-tauri:
        needs: create-release
        strategy:
            fail-fast: false
            matrix:
                include:
                    - platform: macos-14
                      args: "--target aarch64-apple-darwin"
                    - platform: macos-13
                      args: "--target x86_64-apple-darwin"
                    - platform: windows-latest
                      args: ""

        runs-on: ${{ matrix.platform }}

        steps:
            - uses: actions/checkout@v4

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.platform == 'macos-14' && 'aarch64-apple-darwin' || matrix.platform == 'macos-13' && 'x86_64-apple-darwin' || '' }}

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Cache cargo
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: ./src-tauri -> target

            - name: Install frontend deps
              run: bun install

            - name: Build and publish
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  # Updater signing (required so latest.json contains valid signatures).
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
                  # macOS code signing + notarization (optional; without these the
                  # app installs fine but users see a Gatekeeper warning).
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
                  APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
                  APPLE_ID: ${{ secrets.APPLE_ID }}
                  APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
                  APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
              with:
                  releaseId: ${{ needs.create-release.outputs.release_id }}
                  args: ${{ matrix.args }}

    publish-release:
        needs: [create-release, build-tauri]
        runs-on: ubuntu-latest
        steps:
            - name: Publish release
              uses: actions/github-script@v7
              env:
                  RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
              with:
                  script: |
                      await github.rest.repos.updateRelease({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          release_id: process.env.RELEASE_ID,
                          draft: false,
                          prerelease: false,
                          make_latest: "true"
                      });
